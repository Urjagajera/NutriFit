{% extends "base_user.html" %}

{% block title %}NutriFit | Personal Health Quiz{% endblock %}

{% block content %}
<section class="container pt-15vh min-h-100vh">
    <div class="feature-card m-auto text-left max-w-800">
        <span class="section-tag">Assessment</span>
        <h2 class="section-title text-left mb-1 fs-xl">Health & Biometric
            Quiz</h2>
        <p class="text-muted mb-3">Please provide accurate information for the best
            personalized results.</p>

        <form action="{{ url_for('main.quiz') }}" method="POST">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <!-- Basic Metrics -->
            <div class="mb-2 grid-2">
                <div>
                    <label class="text-muted mb-1 d-block fs-md">Age</label>
                    <input type="number" name="age" required class="quiz-input">
                </div>
                <div>
                    <label class="text-muted mb-1 d-block fs-md">Gender</label>
                    <select name="gender" required class="quiz-input">
                        <option value="male">Male</option>
                        <option value="female">Female</option>
                    </select>
                </div>
                <div>
                    <label class="text-muted mb-1 d-block fs-md">Height
                        (cm)</label>
                    <input type="number" step="0.1" name="height" required class="quiz-input">
                </div>
                <div>
                    <label class="text-muted mb-1 d-block fs-md">Weight
                        (kg)</label>
                    <input type="number" step="0.1" name="weight" required class="quiz-input">
                </div>
            </div>

            <hr class="mb-3 border-glass-top">

            <!-- Goals & Habits -->
            <div class="mb-2 grid-2">
                <div>
                    <label class="text-muted mb-1 d-block fs-md">Primary
                        Goal</label>
                    <select name="primary_goal" required class="quiz-input">
                        <option value="weight_loss">Weight Loss</option>
                        <option value="muscle_gain">Muscle Gain</option>
                        <option value="maintenance">Maintenance</option>
                    </select>
                </div>
                <div>
                    <label class="text-muted mb-1 d-block fs-md">Food
                        Habits</label>
                    <select name="food_habit" required class="quiz-input">
                        <option value="vegetarian">Vegetarian</option>
                        <option value="non_vegetarian">Non-Vegetarian</option>
                        <option value="vegan">Vegan</option>
                    </select>
                </div>
            </div>

            <div class="mb-2">
                <label class="text-muted mb-1 d-block fs-md">Allergies
                    (if any)</label>
                <textarea name="allergies" class="quiz-input h-80"></textarea>
            </div>

            <div class="mb-2 grid-2">
                <div>
                    <label class="text-muted mb-1 d-block fs-md">Avg.
                        Sleep Hours</label>
                    <input type="number" step="0.5" name="sleep_hours" required class="quiz-input">
                </div>
                <div>
                    <label class="text-muted mb-1 d-block fs-md">Commitment
                        Level</label>
                    <select name="commitment_level" required class="quiz-input">
                        <option value="low">Low (1-2 days/week)</option>
                        <option value="moderate">Moderate (3-4 days/week)</option>
                        <option value="high">High (5+ days/week)</option>
                    </select>
                </div>
            </div>

            <div class="mb-3">
                <label class="text-muted mb-1 d-block fs-md">Medical
                    Conditions (if any)</label>
                <textarea name="medical_conditions" class="quiz-input h-80"></textarea>
            </div>

            <button type="submit" class="btn btn-primary w-100 fs-lg p-lg">Generate My
                Personalized Plan</button>
        </form>
    </div>
</section>
{% endblock %}
