{% extends "base.html" %}

{% block title %}NutriFit | Create Your Account{% endblock %}

{% block content %}
<section class="container pt-15vh d-flex justify-center align-center min-h-80vh">
    <div class="feature-card modal-content text-left max-w-500">
        <span class="section-tag">Membership</span>
        <h2 class="section-title text-left mb-2 fs-xl">Get Started</h2>
        <form action="{{ url_for('auth.register') }}" method="POST">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="mb-1">
                <label for="full_name" class="text-muted mb-1 d-block fs-md">Full
                    Name</label>
                <input type="text" name="full_name" id="full_name" required class="quiz-input" placeholder="John Doe">
            </div>
            <div class="mb-1">
                <label for="email" class="text-muted mb-1 d-block fs-md">Email
                    Address</label>
                <input type="email" name="email" id="email" required class="quiz-input" placeholder="john@example.com">
            </div>
            <div class="mb-2 grid-2 grid-gap-1">
                <div>
                    <label for="password" class="text-muted mb-1 d-block fs-md">Password</label>
                    <input type="password" name="password" id="password" required class="quiz-input"
                        placeholder="••••••••">
                </div>
                <div>
                    <label for="confirm_password" class="text-muted mb-1 d-block fs-md">Confirm</label>
                    <input type="password" name="confirm_password" id="confirm_password" required class="quiz-input"
                        placeholder="••••••••">
                </div>
            </div>
            <button type="submit" class="btn btn-primary w-100 p-1">Create Account</button>
        </form>
        <p class="text-muted text-center mt-2 fs-md">
            Already have an account?
            <a href="{{ url_for('auth.login') }}" class="text-accent underline-none fw-600">Sign in here</a>
        </p>
    </div>
</section>
{% endblock %}
