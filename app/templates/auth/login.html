{% extends "base.html" %}

{% block title %}NutriFit | Secure Login{% endblock %}

{% block content %}
<section class="container"
    style="padding-top: 15vh; min-height: 80vh; display: flex; justify-content: center; align-items: center;">
    <div class="feature-card" style="max-width: 450px; width: 100%; text-align: left;">
        <span class="section-tag" style="text-align: left;">Welcome Back</span>
        <h2 style="font-family: 'Playfair Display', serif; font-size: 2.5rem; margin-bottom: 2rem;">Sign In</h2>

        <form action="{{ url_for('auth.login') }}" method="POST">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div style="margin-bottom: 1.5rem;">
                <label for="email"
                    style="display: block; margin-bottom: 0.5rem; font-size: 0.9rem; color: var(--text-muted);">Email
                    Address</label>
                <input type="email" id="email" name="email" required
                    style="width: 100%; padding: 0.8rem 1rem; background: var(--glass); border: 1px solid var(--glass-border); border-radius: 12px; color: var(--text-main); font-family: inherit;">
            </div>

            <div style="margin-bottom: 2rem;">
                <label for="password"
                    style="display: block; margin-bottom: 0.5rem; font-size: 0.9rem; color: var(--text-muted);">Password</label>
                <input type="password" id="password" name="password" required
                    style="width: 100%; padding: 0.8rem 1rem; background: var(--glass); border: 1px solid var(--glass-border); border-radius: 12px; color: var(--text-main); font-family: inherit;">
            </div>

            <button type="submit" class="btn btn-primary" style="width: 100%; padding: 1rem;">Access Dashboard</button>
        </form>

        <p style="margin-top: 2rem; text-align: center; color: var(--text-muted); font-size: 0.9rem;">
            New to NutriFit? <a href="{{ url_for('auth.register') }}"
                style="color: var(--accent); text-decoration: none; font-weight: 600;">Create an account</a>
        </p>
    </div>
</section>
{% endblock %}
