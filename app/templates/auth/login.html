{% extends "base.html" %}

{% block title %}NutriFit | Secure Login{% endblock %}

{% block content %}
<section class="container pt-15vh d-flex justify-center align-center min-h-80vh">
    <div class="feature-card modal-content text-left max-w-450">
        <span class="section-tag">Authentication</span>
        <h2 class="section-title text-left mb-2 fs-xl">Sign In</h2>
        <form action="{{ url_for('auth.login') }}" method="POST">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="mb-2">
                <label for="email" class="text-muted mb-1 d-block fs-md">Email
                    Address</label>
                <input type="email" name="email" id="email" required class="quiz-input" placeholder="name@example.com">
            </div>
            <div class="mb-2">
                <label for="password" class="text-muted mb-1 d-block fs-md">Password</label>
                <input type="password" name="password" id="password" required class="quiz-input" placeholder="••••••••">
            </div>
            <button type="submit" class="btn btn-primary w-100 p-1">Access Dashboard</button>
        </form>
        <p class="text-muted text-center mt-2 fs-md">
            New to NutriFit?
            <a href="{{ url_for('auth.register') }}" class="text-accent underline-none fw-600">Create an account</a>
        </p>
    </div>
</section>
{% endblock %}
