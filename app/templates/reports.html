{% extends "base_user.html" %}

{% block title %}NutriFit | Progress Reports{% endblock %}

{% block content %}
<section class="container" style="padding-top: 80px;">
    <div style="margin-bottom: 3rem; display: flex; justify-content: space-between; align-items: flex-end;">
        <div>
            <span class="section-tag" style="text-align: left;">Analytics</span>
            <h1 style="font-family: 'Playfair Display', serif; font-size: 3rem;">Your Progress</h1>
        </div>
        <button onclick="document.getElementById('weightModal').style.display='flex'" class="btn btn-primary">Log New
            Weight</button>
    </div>

    <div class="dashboard-grid">
        <!-- Water Trend Chart -->
        <div class="feature-card" style="text-align: left;">
            <h3 style="margin-bottom: 1.5rem;">Hydration Trend (Last 7 Days)</h3>
            <canvas id="waterChart" style="max-height: 300px;"></canvas>
        </div>

        <!-- Weight Trend Chart -->
        <div class="feature-card" style="text-align: left;">
            <h3 style="margin-bottom: 1.5rem;">Weight Progress</h3>
            <canvas id="weightChart" style="max-height: 300px;"></canvas>
        </div>
    </div>

    <!-- Weight Entry Modal -->
    <div id="weightModal"
        style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); backdrop-filter: blur(8px); z-index: 2000; justify-content: center; align-items: center;">
        <div class="feature-card"
            style="max-width: 400px; width: 90%; text-align: left; background: var(--bg-secondary); border: 1px solid var(--border-color); padding: 2rem;">
            <h3 style="margin-bottom: 1rem;">Update Weight</h3>
            <p style="color: var(--text-muted); margin-bottom: 2rem; font-size: 0.9rem;">Track your transformation over
                time.</p>
            <form action="{{ url_for('main.log_weight') }}" method="POST">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                <div style="margin-bottom: 2rem;">
                    <label
                        style="display: block; margin-bottom: 0.5rem; font-size: 0.8rem; color: var(--text-muted);">Current
                        Weight (kg)</label>
                    <input type="number" step="0.1" name="weight" required
                        style="width: 100%; padding: 0.8rem; background: var(--bg-main); border: 1px solid var(--border-color); border-radius: 12px; color: var(--text-primary); font-family: inherit;">
                </div>
                <div style="display: flex; gap: 1rem;">
                    <button type="submit" class="btn btn-primary" style="flex: 1;">Save Entry</button>
                    <button type="button" onclick="document.getElementById('weightModal').style.display='none'"
                        class="btn btn-outline"
                        style="flex: 1; border-color: var(--text-muted); color: var(--text-muted);">Cancel</button>
                </div>
            </form>
        </div>
    </div>
</section>

<!-- Chart.js CDN -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
    const waterLabels = JSON.parse('{{ water_labels | tojson | safe }}');
    const waterValues = JSON.parse('{{ water_values | tojson | safe }}');
    const weightLabels = JSON.parse('{{ weight_labels | tojson | safe }}');
    const weightValues = JSON.parse('{{ weight_values | tojson | safe }}');



    const chartOptions = {
        responsive: true,
        plugins: {
            legend: { display: false }
        },
        scales: {
            y: {
                beginAtZero: false,
                grid: { color: 'rgba(255,255,255,0.05)' },
                ticks: { color: '#94a2b8' }
            },
            x: {
                grid: { display: false },
                ticks: { color: '#94a2b8' }
            }
        }
    };

    // Water Consumption Chart
    new Chart(document.getElementById('waterChart'), {
        type: 'bar',
        data: {
            labels: waterLabels,
            datasets: [{
                label: 'Consumed (ml)',
                data: waterValues,
                backgroundColor: 'rgba(59, 130, 246, 0.5)',
                borderColor: '#3b82f6',
                borderWidth: 2,
                borderRadius: 8
            }]
        },
        options: chartOptions
    });

    // Weight Progress Chart
    new Chart(document.getElementById('weightChart'), {
        type: 'line',
        data: {
            labels: weightLabels,
            datasets: [{
                label: 'Weight (kg)',
                data: weightValues,
                borderColor: '#10b981',
                backgroundColor: 'rgba(16, 185, 129, 0.1)',
                fill: true,
                tension: 0.4,
                borderWidth: 3,
                pointBackgroundColor: '#10b981'
            }]
        },
        options: chartOptions
    });
</script>
{% endblock %}
