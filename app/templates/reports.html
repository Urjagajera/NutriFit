{% extends "base_user.html" %}

{% block title %}NutriFit | Progress Reports{% endblock %}

{% block content %}
<section class="container pt-80">
    <div class="d-flex justify-between align-center mb-4">
        <div>
            <span class="section-tag text-left">Analytics</span>
            <h1 class="section-title text-left mb-0">Your Progress</h1>
        </div>
        <button onclick="document.getElementById('weightModal').style.display='flex'" class="btn btn-primary">Log New
            Weight</button>
    </div>

    <div class="dashboard-grid">
        <!-- Water Trend Chart -->
        <div class="feature-card text-left">
            <h3 class="mb-2">Hydration Trend (Last 7 Days)</h3>
            <canvas id="waterChart" class="chart-h-300"></canvas>
        </div>

        <!-- Weight Trend Chart -->
        <div class="feature-card text-left">
            <h3 class="mb-2">Weight Progress (Last 10 Logs)</h3>
            <canvas id="weightChart" class="chart-h-300"></canvas>
        </div>
    </div>

    <!-- Weight Entry Modal -->
    <div id="weightModal" class="modal-overlay">
        <div class="feature-card modal-content text-left">
            <span class="section-tag text-left">Actions</span>
            <h3 class="mb-1">Log New Metric</h3>
            <p class="text-muted mb-2 fs-md">Track your transformation over
                time.</p>
            <form action="{{ url_for('main.log_weight') }}" method="POST">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                <div class="text-left">
                    <label class="text-muted mb-1 d-block fs-sm">Current
                        Weight (kg)</label>
                    <input type="number" step="0.1" name="weight" required class="quiz-input p-1">
                </div>
                <div class="d-flex gap-1">
                    <button type="submit" class="btn btn-primary w-100">Save Entry</button>
                    <button type="button" onclick="document.getElementById('weightModal').style.display='none'"
                        class="btn btn-outline text-muted w-100">Cancel</button>
                </div>
            </form>
        </div>
    </div>
</section>

<!-- Chart.js CDN -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
    const waterLabels = JSON.parse('{{ water_labels | tojson | safe }}');
    const waterValues = JSON.parse('{{ water_values | tojson | safe }}');
    const weightLabels = JSON.parse('{{ weight_labels | tojson | safe }}');
    const weightValues = JSON.parse('{{ weight_values | tojson | safe }}');



    const chartOptions = {
        responsive: true,
        plugins: {
            legend: { display: false }
        },
        scales: {
            y: {
                beginAtZero: false,
                grid: { color: 'rgba(255,255,255,0.05)' },
                ticks: { color: '#94a2b8' }
            },
            x: {
                grid: { display: false },
                ticks: { color: '#94a2b8' }
            }
        }
    };

    // Water Consumption Chart
    new Chart(document.getElementById('waterChart'), {
        type: 'bar',
        data: {
            labels: waterLabels,
            datasets: [{
                label: 'Consumed (ml)',
                data: waterValues,
                backgroundColor: 'rgba(59, 130, 246, 0.5)',
                borderColor: '#3b82f6',
                borderWidth: 2,
                borderRadius: 8
            }]
        },
        options: chartOptions
    });

    // Weight Progress Chart
    new Chart(document.getElementById('weightChart'), {
        type: 'line',
        data: {
            labels: weightLabels,
            datasets: [{
                label: 'Weight (kg)',
                data: weightValues,
                borderColor: '#10b981',
                backgroundColor: 'rgba(16, 185, 129, 0.1)',
                fill: true,
                tension: 0.4,
                borderWidth: 3,
                pointBackgroundColor: '#10b981'
            }]
        },
        options: chartOptions
    });
</script>
{% endblock %}
